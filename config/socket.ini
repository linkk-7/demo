                                                                                                                                                                                                                                                                                                                                                  #socket连接配置文件

[server]
#tcp服务器地址ip或域名   不变
host = t4.tncet.com
#服务器端口   不变
port = 9878
#采集箱iemi码，或者视频识别程序的项目id   和项目中的imei码一致
imei = F44EB4DF6F99
#是否需要tcp客户端主动向系统推送信息（1是需要，0是不需要）
need_auto_send = 1

[time]
#尝试重连间隔（单位：秒）
reconnect_time = 3
#发送心跳包间隔（单位：秒）
heartbeat_time = 15
#主动推送消息时间间隔（单位：秒）
send_time = 10
